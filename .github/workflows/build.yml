name: build
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      node-version: 26.2.0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v3
        with:
          version: 11
      - name: Use Node.js ${{ env.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node-version }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Format check
        run: pnpm run fmt.check
      # - name: Lint check
      #   run: pnpm run lint
      # - name: Unit tests
      #   run: pnpm run test.unit
      - name: build check
        run: pnpm run build
